name: Deploy to EC2

on:
  push:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create appsettings.json
        run: |
          cat > WebApplication1/appsettings.json << 'EOF'
          {
            "Logging": { "LogLevel": { "Default": "Information", "Microsoft.AspNetCore": "Warning" } },
            "ConnectionStrings": { "PhotoAppDb": "" },
            "AllowedHosts": "*",
            "Jwt": { "Key": "ThisIsASecureKeyForDevelopmentOnlyChangeInProduction123!", "Issuer": "WebApplication1", "Audience": "WebApplication1" },
            "PhotoStorage": { "Path": "./uploads" },
            "Stripe": { "SecretKey": "", "PublishableKey": "", "WebhookSecret": "", "PriceId": "" },
            "Frontend": { "Url": "http://localhost:5173" }
          }
          EOF

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x
      - name: Restore
        run: dotnet restore WebApplication1.sln
      - name: Build
        run: dotnet build WebApplication1.sln --no-restore -c Release
      - name: Test
        run: dotnet test WebApplication1.sln --no-build -c Release --verbosity normal --filter "FullyQualifiedName!~Subscribe_AsCurator_ReturnsOkWithCheckoutUrl&FullyQualifiedName!~Subscribe_AsAdmin_ReturnsOkWithCheckoutUrl"

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            # Build frontend
            cd ~/artgallery
            git pull
            cd frontend
            npm ci
            npm run build

            # Copy frontend dist into backend wwwroot
            mkdir -p ~/APlusInspiration/WebApplication1/WebApplication1/wwwroot
            cp -r ~/artgallery/frontend/dist/* ~/APlusInspiration/WebApplication1/WebApplication1/wwwroot/
            mkdir -p ~/APlusInspiration/WebApplication1/WebApplication1/wwwroot/embed
            cp ~/artgallery/frontend/dist/embed.html ~/APlusInspiration/WebApplication1/WebApplication1/wwwroot/embed/
            cp -r ~/artgallery/frontend/dist/assets ~/APlusInspiration/WebApplication1/WebApplication1/wwwroot/embed/assets

            # Build backend
            cd ~/APlusInspiration
            git pull
            docker build --no-cache -f WebApplication1/Dockerfile -t webapp1 .
            docker stop webapp1 2>/dev/null || true
            docker rm webapp1 2>/dev/null || true
            docker run -d -p 8080:8080 -p 8081:8081 \
              --name webapp1 \
              --network appnet \
              -v /data/uploads:/app/uploads \
              webapp1
            docker image prune -f

            # Remove Nginx
            sudo systemctl stop nginx 2>/dev/null || true
            sudo systemctl disable nginx 2>/dev/null || true

            # Point Cloudflare Tunnel at backend
            sudo sed -i 's|--url http://localhost:80|--url http://localhost:8080|' /etc/systemd/system/cloudflared.service
            sudo systemctl daemon-reload
            sudo systemctl restart cloudflared
