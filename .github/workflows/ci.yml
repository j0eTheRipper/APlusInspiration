name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Create appsettings.json
        run: |
          cat > WebApplication1/appsettings.json << 'EOF'
          {
            "Logging": { "LogLevel": { "Default": "Information", "Microsoft.AspNetCore": "Warning" } },
            "ConnectionStrings": { "PhotoAppDb": "" },
            "AllowedHosts": "*",
            "Jwt": { "Key": "ThisIsASecureKeyForDevelopmentOnlyChangeInProduction123!", "Issuer": "WebApplication1", "Audience": "WebApplication1" },
            "PhotoStorage": { "Path": "./uploads" },
            "Stripe": { "SecretKey": "", "PublishableKey": "", "WebhookSecret": "", "PriceId": "" },
            "Frontend": { "Url": "http://localhost:5173" }
          }
          EOF

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore
        run: dotnet restore WebApplication1.sln

      - name: Build
        run: dotnet build WebApplication1.sln --no-restore -c Release

      - name: Test
        run: dotnet test WebApplication1.sln --no-build -c Release --verbosity normal
